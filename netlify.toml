[build]
  command = "vite build"
  publish = "dist"
  edge_functions = "netlify/edge-functions"

# Routing for /api/vertex is declared inside the edge function itself
# (`export const config = { path: '/api/vertex' }`), so no redirect needed
# here. The edge runtime streams responses, which lets us return image
# payloads larger than the 6 MB cap that Node Functions enforce.

# SPA fallback: every non-asset path serves index.html so the React app
# (or direct deep-link refresh) doesn't 404.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
